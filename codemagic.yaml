workflows:
  ios-workflow:
    name: Evgreen iOS Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - auth0_vars
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm
      - name: Install dependencies
        script: |
          pnpm install
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Build iOS App
        script: |
          # Este comando genera el archivo .ipa
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com
